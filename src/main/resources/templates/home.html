<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Analytics Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light" style="min-height: 100vh;">
<div class="container py-4">
    <h1 class="mb-2 fw-bold">App Analytics Dashboard</h1>
    <p class="text-muted mb-3">Monitor user activity, screen engagement, and event trends in one place.</p>

    <div class="d-flex flex-wrap gap-2 mb-2">
        <button class="btn btn-outline-primary filter-btn active" onclick="setFilter('7', this)">Last 7 Days</button>
        <button class="btn btn-outline-primary filter-btn" onclick="setFilter('30', this)">Last 30 Days</button>
        <button class="btn btn-outline-primary filter-btn" onclick="setFilter('all', this)">All Time</button>
    </div>

    <p class="text-muted small mb-4">Last updated: just now</p>

    <div class="row g-3 mb-4">
        <div class="col-md-3 col-sm-6">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    <p class="text-muted mb-1">Total Active Users</p>
                    <h3 id="totalActiveUsers" class="mb-0 fw-bold text-primary">0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3 col-sm-6">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    <p class="text-muted mb-1">Total Screen Views</p>
                    <h3 id="totalScreenViews" class="mb-0 fw-bold text-success">0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3 col-sm-6">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    <p class="text-muted mb-1">Total Events</p>
                    <h3 id="totalEvents" class="mb-0 fw-bold text-danger">0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3 col-sm-6">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    <p class="text-muted mb-1">Top Screen</p>
                    <h5 id="topScreen" class="mb-0 fw-bold text-dark">-</h5>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-4 h-100">
                <div class="card-body p-4">
                    <h5 class="fw-semibold mb-3">Daily Active Users</h5>
                    <div style="height: 300px;">
                        <canvas id="dauChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-4 h-100">
                <div class="card-body p-4">
                    <h5 class="fw-semibold mb-3">Top Screens</h5>
                    <div style="height: 300px;">
                        <canvas id="screensChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-4 h-100">
                <div class="card-body p-4">
                    <h5 class="fw-semibold mb-3">Event Types</h5>
                    <div style="height: 300px;">
                        <canvas id="eventTypesChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentFilter = '7';
    let dauChartInstance;
    let screensChartInstance;
    let eventTypesChartInstance;

    function filterDataByDays(data, days) {
        if (days === 'all') return data;

        const today = new Date();
        const cutoff = new Date();
        cutoff.setDate(today.getDate() - parseInt(days));

        return data.filter(item => new Date(item.date) >= cutoff);
    }

    function setFilter(days, buttonElement) {
        currentFilter = days;

        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        buttonElement.classList.add('active');

        loadSummaryCards();
        loadDAUChart();
        loadTopScreensChart();
        loadEventTypesChart();
    }

    async function loadSummaryCards() {
        try {
            const [dauRes, screensRes, eventsRes] = await Promise.all([
                fetch('/api/analytics/dau'),
                fetch('/api/analytics/events-by-screen'),
                fetch('/api/analytics/events-by-type')
            ]);

            let dauData = await dauRes.json();
            const screensData = await screensRes.json();
            const eventsData = await eventsRes.json();

            dauData = filterDataByDays(dauData, currentFilter);

            const totalActiveUsers = dauData.reduce((sum, item) => sum + item.activeUsers, 0);
            const totalScreenViews = screensData.reduce((sum, item) => sum + item.count, 0);
            const totalEvents = eventsData.reduce((sum, item) => sum + item.count, 0);

            const topScreenItem = screensData.reduce((max, item) =>
                    item.count > max.count ? item : max,
                screensData[0]
            );

            document.getElementById('totalActiveUsers').textContent = totalActiveUsers;
            document.getElementById('totalScreenViews').textContent = totalScreenViews;
            document.getElementById('totalEvents').textContent = totalEvents;
            document.getElementById('topScreen').textContent = topScreenItem ? topScreenItem.screenName : '-';
        } catch (e) {
            console.error('Summary cards error:', e);
        }
    }

    async function loadDAUChart() {
        try {
            const res = await fetch('/api/analytics/dau');
            let data = await res.json();

            data = filterDataByDays(data, currentFilter);

            if (dauChartInstance) {
                dauChartInstance.destroy();
            }

            dauChartInstance = new Chart(document.getElementById('dauChart'), {
                type: 'line',
                data: {
                    labels: data.map(d => d.date),
                    datasets: [{
                        label: 'Daily Active Users',
                        data: data.map(d => d.activeUsers),
                        borderColor: '#4f46e5',
                        backgroundColor: 'rgba(79,70,229,0.15)',
                        tension: 0.3,
                        fill: true,
                        pointBackgroundColor: '#4f46e5',
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                boxWidth: 12
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0,0,0,0.05)'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        } catch (e) {
            console.error('DAU chart error:', e);
        }
    }

    async function loadTopScreensChart() {
        try {
            const res = await fetch('/api/analytics/events-by-screen');
            const data = await res.json();

            if (screensChartInstance) {
                screensChartInstance.destroy();
            }

            screensChartInstance = new Chart(document.getElementById('screensChart'), {
                type: 'bar',
                data: {
                    labels: data.map(d => d.screenName),
                    datasets: [{
                        label: 'Views',
                        data: data.map(d => d.count),
                        backgroundColor: '#22c55e',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                boxWidth: 12
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0,0,0,0.05)'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        } catch (e) {
            console.error('Top Screens chart error:', e);
        }
    }

    async function loadEventTypesChart() {
        try {
            const res = await fetch('/api/analytics/events-by-type');
            const data = await res.json();

            if (eventTypesChartInstance) {
                eventTypesChartInstance.destroy();
            }

            eventTypesChartInstance = new Chart(document.getElementById('eventTypesChart'), {
                type: 'doughnut',
                data: {
                    labels: data.map(d => d.eventType),
                    datasets: [{
                        data: data.map(d => d.count),
                        backgroundColor: ['#4f46e5', '#22c55e', '#f97316', '#e11d48', '#0ea5e9'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                boxWidth: 12
                            }
                        }
                    }
                }
            });
        } catch (e) {
            console.error('Event Types chart error:', e);
        }
    }

    loadSummaryCards();
    loadDAUChart();
    loadTopScreensChart();
    loadEventTypesChart();
</script>
</body>
</html>
